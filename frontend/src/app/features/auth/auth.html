<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">MMM Bank</div>
      <h1>{{ isLogin ? 'Welcome again!' : 'Create an account' }}</h1>
      <p>{{ isLogin ? 'Log in to your account' : 'Join 35 million users' }}</p>
    </div>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="name@email.com"
               [class.error]="authForm.get('email')?.invalid && authForm.get('email')?.touched">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••"
               [class.error]="authForm.get('password')?.invalid && authForm.get('password')?.touched">
      </div>

      <div class="form-group" *ngIf="!isLogin">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="Vladyslav Demchenko">
      </div>

      <button type="submit" class="btn-primary" [disabled]="authForm.invalid">
        {{ isLogin ? 'Log in' : 'Sign up' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>{{ isLogin ? "Don't have an account?" : "Do you already have an account?" }}
        <span (click)="toggleMode()">{{ isLogin ? 'Create' : 'Login' }}</span>
      </p>
    </div>
  </div>
</div>
