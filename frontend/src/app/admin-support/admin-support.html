<div class="admin-container">
  <div class="sidebar">
    <h3>Активні чати</h3>
    <ul>
      <li *ngFor="let chat of chats"
          [class.active]="chat.id === selectedChatId"
          (click)="selectChat(chat.id)">
        User: {{ chat.id }}
      </li>
    </ul>
  </div>

  <div class="chat-area" *ngIf="selectedChatId; else noSelect">
    <div class="messages">
      <div *ngFor="let msg of messages" [ngClass]="msg.sender">
        <div class="bubble">
          <strong>{{ msg.sender }}:</strong> {{ msg.text }}
          <span class="time">{{ msg.time | date:'HH:mm' }}</span>
        </div>
      </div>
    </div>

    <div class="input-area">
      <input [(ngModel)]="replyText" (keyup.enter)="sendReply()" placeholder="Напишіть відповідь...">
      <button (click)="sendReply()">Відповісти</button>
    </div>
  </div>

  <ng-template #noSelect>
    <div class="chat-area empty">Виберіть чат, щоб почати спілкування</div>
  </ng-template>
</div>
