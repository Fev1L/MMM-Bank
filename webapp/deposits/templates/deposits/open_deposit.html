{% extends 'main/users/users_layout.html' %}
{% block title %}Open Deposit{% endblock %}

{% block content %}

<div class="login-page">
    <div class="login-card">

        <h1>Open Deposit 💰</h1>

        {% if error %}
        <div class="login-error">
            <p>{{ error }}</p>
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <i class="fa-solid fa-dollar-sign"></i>
                <input
                        type="number"
                        name="amount"
                        placeholder="Amount"
                        min="1"
                        step="0.01"
                        required
                >
            </div>

            <div class="input-group">
                <i class="fa-solid fa-calendar"></i>
                <select name="duration" required>
                    <option value="">Select duration</option>
                    <option value="3">3 months (3%)</option>
                    <option value="6">6 months (5%)</option>
                    <option value="12">12 months (7%)</option>
                    <option value="24">24 months (9%)</option>
                </select>
            </div>

            <button type="submit" class="login-btn">
                Open Deposit
            </button>

        </form>

        <div class="login-footer">
            <a href="{% url 'deposit' %}">
                ← Back
            </a>
        </div>

    </div>
</div>

{% endblock %}
