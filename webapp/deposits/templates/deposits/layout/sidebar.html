{% load static %}
{% load sidebar_links %}

{% get_links as links %}

<div class="bottom-nav">
    {% for link in links %}
        <a href="{{ link.href }}" 
           class="bottom-item {% if request.path == link.href %}active{% endif %}">
            <i class="fa-solid {{ link.icon }}"></i>
            <span>{{ link.name }}</span>
        </a>
    {% endfor %}
</div>
