{% load static %}
{% load sidebar_links %}

{% get_casino_links as links %}

{% if request.user.is_authenticated %}
<div class="sidebar">
  <div class="sidebar-logo">
    <img src="{% static 'main/img/MMM-Logo.png' %}" alt="MMM Bank Logo">
  </div>

  <div class="sidebar-user">
    <a href="/profile" class="user-avatar">
      <img src="https://github.com/Fev1L.png" alt="avatar">
    </a>

    <div class="user-greeting">
      Hi, <strong>{{ request.user.username }}</strong>
    </div>

    <form method="POST" action="/logout">
      {% csrf_token %}
      <button class="logout-btn" type="submit">Logout</button>
    </form>
  </div>

  <div class="sidebar-links">
    {% for link in links %}
    <a href="{{ link.href }}"
       class="sidebar-item {% if request.path == link.href %}active{% endif %}">
      <i class="fa-solid {{ link.icon }}"></i>
      <span>{{ link.name }}</span>
    </a>
    {% endfor %}
  </div>
</div>
{% endif %}
