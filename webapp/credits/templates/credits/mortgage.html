{% extends 'main/users/users_layout.html' %}

{% block title %}Mortgage{% endblock %}

{% block content %}

<div class="login-page">
    <div class="login-card">

        <h1>Mortgage</h1>
        <p class="login-subtitle">
            Rate 3.5% • Max $100000 • 30 years
        </p>


        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <i class="fa-solid fa-money-bill"></i>
                <input type="number"
                       name="amount"
                       placeholder="Amount"
                       required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-calendar"></i>
                <input type="number"
                       name="years"
                       placeholder="Years"
                       required>
            </div>

            <button type="submit" class="login-btn">
                Apply
            </button>

        </form>


        <a href="{% url 'credits' %}" class="login-btn" style="margin-top:10px; display:block; text-align:center;">
    ← Back
</a>

    </div>
</div>

{% endblock %}
