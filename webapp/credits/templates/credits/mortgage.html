{% extends 'main/users/users_layout.html' %}

{% block title %}Mortgage{% endblock %}

{% block content %}

<div class="login-page">
    <div class="login-card">

        <a href="{% url 'credits' %}" class="login-btn"
           style="margin-bottom: 10px; text-align:center; display:block;">
            ← Back
        </a>

        <h1>Mortgage</h1>
        <p class="login-subtitle">
            Apply for mortgage in MMM Bank
        </p>


        <div class="login-info">

            <p>Rate: 3.5%</p>
            <p>Max amount: $100000</p>
            <p>Max period: 30 years</p>

        </div>


        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <i class="fa-solid fa-money-bill"></i>
                <input type="number"
                       name="amount"
                       placeholder="Amount"
                       required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-calendar"></i>
                <input type="number"
                       name="years"
                       placeholder="Years"
                       required>
            </div>

            <button type="submit" class="login-btn">
                Apply mortgage
            </button>

        </form>

    </div>
</div>

{% endblock %}
