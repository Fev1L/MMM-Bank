{% load static %}
<section class="contacts">
    <div class="contacts-header">
        <h2>Contacts</h2>
        <a href="/contacts/" class="view-all">More</a>
    </div>

    <div class="contact-list">
        {% for contact in contacts %}
            <div class="contact-item">
                <div class="contact-left">
                    <img src="https://github.com/Fev1L.png" class="contact-avatar">
                    <div class="contact-info">
                        <div class="contact-name">{{ contact.friend }}</div>
                        <div class="contact-time">Today</div>
                    </div>
                </div>
                <div class="contact-actions">
                    <a href="/contacts/send/{{ contact.friend.id }}/" class="send-btn">Send</a>
                    <a href="#" class="request-btn">Request</a>
                </div>
            </div>
        {% endfor %}
    </div>

</section>
