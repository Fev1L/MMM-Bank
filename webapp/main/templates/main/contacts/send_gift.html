{% extends 'main/users/users_layout.html' %}

{% block title %} Send Money {% endblock %}

{% block content %}
<div class="login-page">

  <div class="login-card gift-card">

    <h1>Send Gift 🎁</h1>
    <p class="login-subtitle">
      Surprise someone with a gift transfer
    </p>

    {% if error %}
    <div class="login-error">
      <p>{{ error }}</p>
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input
                type="text"
                name="user"
                placeholder="Username or Email"
                required
        >
      </div>

      <div class="input-group">
        <i class="fa-solid fa-gift"></i>
        <input
                type="number"
                step="0.01"
                name="amount"
                placeholder="Gift amount"
                required
        >
      </div>

      <div class="input-group">
        <i class="fa-solid fa-message"></i>
        <input type="text" name="message" placeholder="Add a message (optional)">
      </div>

      <button type="submit" class="login-btn gift-btn">
        Send Gift
      </button>

    </form>

    <div class="login-footer">
      <a href="{% url 'contacts_list' %}">
        ← Back to contacts
      </a>
    </div>

  </div>

</div>
{% endblock %}
