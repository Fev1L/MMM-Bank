{% extends 'main/layout/layout.html' %}

{% block title%}{{ request.user.username }} Account {% endblock %}

{% block content%}
    <h2>Add Contact</h2>
      <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
        <button type="submit">Add</button>
      </form>
    <a href="{% url 'contacts_list' %}">Back to contacts</a>
{% endblock %}
