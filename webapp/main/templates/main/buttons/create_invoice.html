{% extends 'main/users/users_layout.html' %}

{% block title %} Create Invoice {% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">

        <h1>Create Invoice</h1>

        {% if error %}
        <div class="login-error">
            <p>{{ error }}</p>
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input
                        type="text"
                        name="user"
                        placeholder="Client username or email"
                        required
                >
            </div>

            <div class="input-group">
                <i class="fa-solid fa-file-lines"></i>
                <input
                        type="text"
                        name="title"
                        placeholder="Invoice title (e.g. Web design)"
                        required
                >
            </div>

            <div class="input-group">
                <i class="fa-solid fa-dollar-sign"></i>
                <input
                        type="number"
                        name="amount"
                        placeholder="Amount"
                        min="1"
                        step="0.01"
                        required
                >
            </div>

            <div class="input-group">
                <i class="fa-solid fa-comment"></i>
                <input
                        type="text"
                        name="description"
                        placeholder="Description (optional)"
                >
            </div>

            <button type="submit" class="login-btn invoice-btn">
                Create Invoice
            </button>

        </form>

        <div class="login-footer">
            <a href="{% url 'contacts_list' %}">
                ← Back to transfer
            </a>
        </div>

    </div>
</div>
{% endblock %}
