{% extends 'main/users/users_layout.html' %}

{% block title %} Transfer to Bank {% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">

    <h1>Transfer to Bank</h1>

    {% if error %}
    <div class="login-error">
      <p>{{ error }}</p>
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="input-group">
        <i class="fa-solid fa-building-columns"></i>
        <input
                type="text"
                name="bank_name"
                placeholder="Bank name"
                required
        >
      </div>

      <div class="input-group">
        <i class="fa-solid fa-credit-card"></i>
        <input
                type="text"
                name="account_number"
                placeholder="Account number / IBAN"
                required
        >
      </div>

      <div class="input-group">
        <i class="fa-solid fa-dollar-sign"></i>
        <input
                type="number"
                name="amount"
                placeholder="Amount"
                min="1"
                step="0.01"
                required
        >
      </div>

      <div class="input-group">
        <i class="fa-solid fa-comment"></i>
        <input
                type="text"
                name="title"
                placeholder="Transfer title (optional)"
        >
      </div>

      <button type="submit" class="login-btn bank-btn">
        Send to Bank
      </button>

    </form>

    <div class="login-footer">
      <a href="{% url 'contacts_list' %}">
        ← Back to transfer
      </a>
    </div>

  </div>
</div>
{% endblock %}
