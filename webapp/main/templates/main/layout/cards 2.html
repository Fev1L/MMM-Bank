<section class="cards-section">
    <div class="card">
        <div class="card-header">
            <span class="card-title">Debit Card</span>
            <div class="card-icon"><i class="fa-solid fa-credit-card"></i></div>
        </div>

        <div class="card-balance">${{ balance }}</div>

        <div class="card-info">
            <span class="label">Account Number</span>
            <span class="number">{{ card.masked_number }}</span>
        </div>
        <div class="card-change">{{ card.type }}</div>
    </div>
</section>
