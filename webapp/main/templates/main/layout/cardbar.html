<div class="cardbar">
    <div class="cardbar-top">
        <div class="cardbar-actions">
            <a href="{% url 'inbox' %}" class="icon-btn">
                <i class="fa-solid fa-bell"></i>
                {% if unread_count > 0 %}
                <span class="notif-count">{{ unread_count }}</span>
                {% endif %}
            </a>

            <button class="icon-btn">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </div>

    <div class="cardbar-section">
        <div class="cardbar-header">
            <h3>My Card</h3>
            <button class="add-btn">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <div class="card-slider">
            <div class="credit-card">
                <div class="card-number">
                    5235 •••• •••• 6288
                </div>

                <div class="card-exp">
                    EXP 03/29
                </div>
            </div>
        </div>

        <div class="slider-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <div class="cardbar-section">
        <div class="cardbar-header">
            <h3>My Bank</h3>
            <button class="add-btn">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <div class="bank-card">
            <div class="bank-name">
                U.S. Bank
            </div>

            <div class="bank-type">
                CHECKING
            </div>

            <div class="bank-number">
                •••• •••• •••• 6288
            </div>
        </div>

        <div class="slider-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>
</div>
