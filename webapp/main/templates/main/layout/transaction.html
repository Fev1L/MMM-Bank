{% load static %}
<section class="transactions">
    <div class="transactions-header">
        <h2>Recent Activity</h2>
        <a href="#" class="view-all">More</a>
    </div>

    <div class="transaction-list">
        {% for transaction in transactions %}
            <div class="transaction-item">
                <div class="transaction-left">
                    <div class="icon"><i class="{{ transaction.category.icon }}"></i></div>
                    <div>
                        <div class="title">{{ transaction.title }}</div>
                        <div class="category">{{ transaction.category }}</div>
                    </div>
                </div>
                <div class="transaction-right
                    {% if transaction.category.type == 'deposit' %} positive {%  else %} negative {% endif %}">
                    <div class="amount">
                        {% if transaction.category.type == "deposit" %} ${{ transaction.amount }}
                        {%  else %} -${{ transaction.amount }}
                        {% endif %}</div>
                    <div class="date">{{ transaction.created_at }}</div>
                </div>
            </div>

        {% endfor %}
    </div>
</section>
